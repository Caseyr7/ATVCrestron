name: Build pyatv 0.15.1 deps for Crestron CP4 (armv7l, cp38)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-pyatv-deps.yml'
      - '.github/workflows/build-pyatv-inside-container.sh'
      - 'requirements-pyatv.txt'

jobs:
  build:
    name: Build armv7l cp38 deps via QEMU
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (enables arm/v7 Docker)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Make build script executable
        run: chmod +x .github/workflows/build-pyatv-inside-container.sh

      - name: Build deps inside python:3.8-bullseye arm/v7
        run: |
          set -euxo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/out/deps"

          # python:3.8-bullseye is glibc 2.31 - matches Crestron Python 3.8.x.
          # The build script is mounted read-only and executed as the container's command.
          docker run --rm --platform linux/arm/v7 \
            -v "${GITHUB_WORKSPACE}/requirements-pyatv.txt:/req.txt:ro" \
            -v "${GITHUB_WORKSPACE}/.github/workflows/build-pyatv-inside-container.sh:/build.sh:ro" \
            -v "${GITHUB_WORKSPACE}/out/deps:/deps" \
            python:3.8-bullseye /build.sh

          # Write a manifest so the user can see exactly what landed in the zip.
          (cd "${GITHUB_WORKSPACE}/out/deps" && find . -maxdepth 2 -type d | sort) \
            > "${GITHUB_WORKSPACE}/out/MANIFEST.txt"
          echo '---' >> "${GITHUB_WORKSPACE}/out/MANIFEST.txt"
          (cd "${GITHUB_WORKSPACE}/out/deps" && find . -name '*.so' | sort) \
            >> "${GITHUB_WORKSPACE}/out/MANIFEST.txt"

      - name: Fail build if /deps is empty
        run: |
          set -eu
          count=$(find "${GITHUB_WORKSPACE}/out/deps" -mindepth 1 -maxdepth 1 | wc -l)
          echo "Top-level entries in out/deps: ${count}"
          if [ "${count}" -lt 5 ]; then
            echo "::error::out/deps has fewer than 5 top-level entries - build probably failed silently"
            ls -la "${GITHUB_WORKSPACE}/out/deps" || true
            exit 1
          fi

      - name: Fail build if any .so still has gnueabihf suffix
        run: |
          set -eu
          bad=$(find "${GITHUB_WORKSPACE}/out/deps" -name '*gnueabihf.so' -print || true)
          if [ -n "${bad}" ]; then
            echo "::error::Found .so files with unrenamed gnueabihf suffix - Crestron Python will not load these:"
            echo "${bad}"
            exit 1
          fi

      - name: Upload deps artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyatv-0.15.1-crestron-cp4-deps
          path: out/
          if-no-files-found: error
          retention-days: 30
